name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Verify project version matches tag
        shell: pwsh
        run: |
          $projectVersion = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          $tagVersion = $env:GITHUB_REF_NAME.Substring(1)
          if ($projectVersion -ne $tagVersion) {
            throw "Project version $projectVersion does not match tag $env:GITHUB_REF_NAME"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run release checks
        run: python -m pytest -q

      - name: Compile source
        run: python -m compileall -q src tests

      - name: Build portable executable
        shell: pwsh
        run: .\build.ps1

      - name: Create release archive
        shell: pwsh
        run: |
          $executable = "dist\CodexUsageTaskbar\CodexUsageTaskbar.exe"
          if (-not (Test-Path -LiteralPath $executable)) {
            throw "Expected packaged executable was not created: $executable"
          }
          $archive = "CodexUsageTaskbar-$env:GITHUB_REF_NAME-windows-x64.zip"
          Compress-Archive -Path "dist\CodexUsageTaskbar\*" -DestinationPath $archive -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish GitHub release
        shell: pwsh
        run: |
          gh release create $env:GITHUB_REF_NAME $env:ARCHIVE `
            --title "Codex Usage Taskbar $env:GITHUB_REF_NAME" `
            --generate-notes
